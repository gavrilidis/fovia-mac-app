name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: macos-14
    defaults:
      run:
        working-directory: faceflow-client
    env:
      FACEFLOW_SECRET: ci_dev_secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: faceflow-client/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run lint
      - run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

  test-rust:
    runs-on: macos-14
    defaults:
      run:
        working-directory: faceflow-client
    env:
      FACEFLOW_SECRET: ci_dev_secret
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --manifest-path src-tauri/Cargo.toml

  test-ts:
    runs-on: macos-14
    defaults:
      run:
        working-directory: faceflow-client
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: faceflow-client/package-lock.json
      - run: npm ci
      - run: npm run test --if-present

  build:
    runs-on: macos-14
    defaults:
      run:
        working-directory: faceflow-client
    env:
      FACEFLOW_SECRET: ci_dev_secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: faceflow-client/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
      - run: npm run tauri build
